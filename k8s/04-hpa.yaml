apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cgi-devops-practice-hpa
  namespace: cgi-devops-practice
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cgi-devops-practice-app
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
